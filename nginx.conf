server {
    server_name sorinote.2bpencil.online;

    # 1. Serve static frontend React files
    location / {
        root /var/www/sorinote/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Serve static uploaded media files (images, audio) directly via Nginx
    location /uploads/ {
        alias /var/www/sorinote/server/uploads/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # 3. Proxy API requests to backend Express server
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Proxy Socket.IO WebSocket connections to backend server
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400; # Keep connection alive
    }

    # SSL configuration (Managed by Certbot)
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/sorinote.2bpencil.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sorinote.2bpencil.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Redirect HTTP to HTTPS
server {
    if ($host = sorinote.2bpencil.online) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name sorinote.2bpencil.online;
    return 404;
}
